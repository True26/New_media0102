name: Scraper TioPlus

on:
  workflow_dispatch:        # Trigger manual desde la pestaña Actions
  schedule:
    - cron: '0 3 * * *'    # Automatico cada dia a las 3am UTC (10pm Colombia)

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350    # 5h50min — para antes del limite de 6h de GitHub

    permissions:
      contents: write       # Necesario para hacer commit del JSON de vuelta al repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Instalar Playwright + Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Ejecutar scraper
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python scraper.py

      - name: Guardar progreso en el repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add links_recolectados.json || true
          git add fase1_progreso.json || true
          git commit -m "scraper: actualizar catalogo [skip ci]" || echo "Sin cambios nuevos"
          git push || (sleep 15 && git push) || true
